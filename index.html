<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка Контента</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f4f7f6;
        }
        /* Боковое меню */
        .sidebar {
            width: 260px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            text-align: center;
            padding: 20px 0;
            margin: 0;
            background-color: #1a252f;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .menu li {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #34495e;
            transition: 0.3s;
        }
        .menu li:hover, .menu li.active {
            background-color: #34495e;
            border-left: 4px solid #18bc9c;
        }
        .content-area {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .frames-wrapper {
            flex-grow: 1;
            min-height: 0;
            position: relative;
            overflow: hidden;
        }
        .frames-wrapper iframe.content {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .frames-wrapper iframe.content.hidden {
            display: none;
        }
        .wip-placeholder {
            display: none;
            flex-grow: 1;
            align-items: center;
            justify-content: center;
            background: #ecf0f1;
            color: #7f8c8d;
            font-size: 1.5rem;
            padding: 2rem;
            text-align: center;
        }
        .wip-placeholder.visible {
            display: flex;
        }
        /* Модальное окно подтверждения перезагрузки */
        .reload-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .reload-overlay.visible {
            display: flex;
        }
        .reload-dialog {
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            max-width: 360px;
        }
        .reload-dialog p {
            margin: 0 0 1.25rem 0;
            color: #2c3e50;
        }
        .reload-dialog .buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .reload-dialog button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .reload-dialog .btn-cancel {
            background: #ecf0f1;
            color: #2c3e50;
        }
        .reload-dialog .btn-cancel:hover {
            background: #bdc3c7;
        }
        .reload-dialog .btn-reload {
            background: #18bc9c;
            color: white;
        }
        .reload-dialog .btn-reload:hover {
            background: #15a589;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>CONTENT TOOLS</h2>
        <ul class="menu" id="menu">
            <li class="active" onclick="loadTool(this, 'book_cleaner/index.html')">🧹 Book Cleaner</li>
            <li onclick="loadTool(this, 'book_metadata/index.html')">🏷️ Metadata Prompt</li>
            <li onclick="loadTool(this, 'audio_check/index.html')">🔊 Audio Check</li>
        </ul>
    </div>

    <div class="content-area">
        <div id="frames-wrapper" class="frames-wrapper">
            <iframe class="content" id="tool-frame" data-src="book_cleaner/index.html" src="book_cleaner/index.html"></iframe>
        </div>
        <div class="wip-placeholder" id="wip-placeholder">
            <span>Work in progress</span>
        </div>
    </div>

    <div class="reload-overlay" id="reload-overlay" aria-hidden="true">
        <div class="reload-dialog">
            <p>Вы уверены, что хотите перезагрузить страницу? Все данные пропадут.</p>
            <div class="buttons">
                <button type="button" class="btn-cancel" id="reload-cancel">Отмена</button>
                <button type="button" class="btn-reload" id="reload-confirm">Перезагрузить</button>
            </div>
        </div>
    </div>

    <script>
        function showReloadOverlay() {
            document.getElementById('reload-overlay').classList.add('visible');
            document.getElementById('reload-overlay').setAttribute('aria-hidden', 'false');
        }

        // Перехват F5 и Cmd+R в главном окне — как раньше
        window.addEventListener('keydown', function (e) {
            if (e.key === 'F5' || (e.key === 'r' && (e.metaKey || e.ctrlKey))) {
                e.preventDefault();
                e.stopPropagation();
                showReloadOverlay();
            }
        }, true);

        function attachReloadKeydownToFrame(frame) {
            if (!frame || !frame.contentWindow) return;
            try {
                frame.contentWindow.addEventListener('keydown', function (e) {
                    if (e.key === 'F5' || (e.key === 'r' && (e.metaKey || e.ctrlKey))) {
                        e.preventDefault();
                        e.stopPropagation();
                        showReloadOverlay();
                    }
                }, true);
            } catch (err) { /* cross-origin / file:// */ }
        }

        document.getElementById('reload-cancel').addEventListener('click', function () {
            document.getElementById('reload-overlay').classList.remove('visible');
            document.getElementById('reload-overlay').setAttribute('aria-hidden', 'true');
        });

        document.getElementById('reload-confirm').addEventListener('click', function () {
            sessionStorage.setItem('reload_confirmed', '1');
            window.location.reload();
        });

        // Закрытие вкладки/уход — предупреждение (при подтверждённом F5 не показываем)
        window.addEventListener('beforeunload', function (e) {
            if (sessionStorage.getItem('reload_confirmed')) return;
            // Закрываем кастомный оверлей, чтобы при отмене стандартного алерта он не оставался висеть
            document.getElementById('reload-overlay').classList.remove('visible');
            document.getElementById('reload-overlay').setAttribute('aria-hidden', 'true');
            e.preventDefault();
            e.returnValue = '';
            return '';
        });

        // Сбрасываем флаг после загрузки, чтобы при следующем закрытии вкладки снова спросить
        sessionStorage.removeItem('reload_confirmed');

        // Пути к реально существующим инструментам (остальные показывают WIP)
        const AVAILABLE_TOOLS = [
            'book_cleaner/index.html',
            'audio_check/index.html',
            'book_metadata/index.html',
        ];

        const framesWrapper = document.getElementById('frames-wrapper');
        const wipPlaceholder = document.getElementById('wip-placeholder');
        /** @type {Record<string, HTMLIFrameElement>} */
        const framesCache = {};

        // Регистрируем начальный iframe в кэше и вешаем перехват F5 внутри него
        (function initCache() {
            const initialFrame = document.getElementById('tool-frame');
            const url = initialFrame.getAttribute('data-src');
            if (url) framesCache[url] = initialFrame;
            function onFrameLoad() {
                try { attachReloadKeydownToFrame(initialFrame); } catch (err) { /* cross-origin */ }
            }
            initialFrame.addEventListener('load', onFrameLoad);
            if (initialFrame.contentDocument && initialFrame.contentDocument.readyState === 'complete') onFrameLoad();
        })();

        function loadTool(element, url) {
            document.querySelectorAll('.menu li').forEach(li => li.classList.remove('active'));
            element.classList.add('active');

            if (!AVAILABLE_TOOLS.includes(url)) {
                Object.values(framesCache).forEach(f => f.classList.add('hidden'));
                wipPlaceholder.classList.add('visible');
                return;
            }

            wipPlaceholder.classList.remove('visible');

            let frame = framesCache[url];
            if (!frame) {
                frame = document.createElement('iframe');
                frame.className = 'content';
                frame.setAttribute('data-src', url);
                frame.addEventListener('load', function () {
                    try { attachReloadKeydownToFrame(frame); } catch (err) { /* cross-origin */ }
                });
                frame.src = url;
                framesWrapper.appendChild(frame);
                framesCache[url] = frame;
            }

            Object.values(framesCache).forEach(f => f.classList.add('hidden'));
            frame.classList.remove('hidden');
        }
    </script>
</body>
</html>
