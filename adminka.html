<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка Контента</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f4f7f6;
        }
        /* Боковое меню */
        .sidebar {
            width: 260px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            text-align: center;
            padding: 20px 0;
            margin: 0;
            background-color: #1a252f;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .menu li {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #34495e;
            transition: 0.3s;
        }
        .menu li:hover, .menu li.active {
            background-color: #34495e;
            border-left: 4px solid #18bc9c;
        }
        .content-area {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .content-area iframe.content {
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }
        .content-area iframe.content.hidden {
            display: none;
        }
        .wip-placeholder {
            display: none;
            flex-grow: 1;
            align-items: center;
            justify-content: center;
            background: #ecf0f1;
            color: #7f8c8d;
            font-size: 1.5rem;
            padding: 2rem;
            text-align: center;
        }
        .wip-placeholder.visible {
            display: flex;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>CONTENT TOOLS</h2>
        <ul class="menu" id="menu">
            <li class="active" onclick="loadTool(this, 'book_cleaner/index.html')">🧹 Book Cleaner</li>
            <li onclick="loadTool(this, 'audio_generation/index.html')">🎧 Audio Gen (WIP)</li>
            <li onclick="loadTool(this, 'book_metadata/index.html')">🏷️ Metadata (WIP)</li>
        </ul>
    </div>

    <div class="content-area">
        <iframe class="content" id="tool-frame" src="book_cleaner/index.html"></iframe>
        <div class="wip-placeholder" id="wip-placeholder">
            <span>Work in progress</span>
        </div>
    </div>

    <script>
        // Пути к реально существующим инструментам (остальные показывают WIP)
        const AVAILABLE_TOOLS = ['book_cleaner/index.html'];

        function loadTool(element, url) {
            document.querySelectorAll('.menu li').forEach(li => li.classList.remove('active'));
            element.classList.add('active');

            const frame = document.getElementById('tool-frame');
            const wip = document.getElementById('wip-placeholder');

            if (AVAILABLE_TOOLS.includes(url)) {
                frame.src = url;
                frame.classList.remove('hidden');
                wip.classList.remove('visible');
            } else {
                frame.classList.add('hidden');
                wip.classList.add('visible');
            }
        }
    </script>
</body>
</html>
