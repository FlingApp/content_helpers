            box-sizing: border-box;
        }
        .prompt-textarea:focus {
            outline: none;
            border-color: #18bc9c;
            box-shadow: 0 0 0 2px rgba(24, 188, 156, 0.2);

        (function () {

            var btn = document.getElementById('btn-copy');
            var textarea = document.getElementById('prompt-text');

            // Вставляем текст при загрузке
            textarea.value = MY_PROMPT_TEXT.trim();

            // Логика кнопки копирования
            btn.addEventListener('click', function () {
                var text = textarea.value;
                
                // Функция для визуального эффекта кнопки
                function showSuccess() {
                    btn.textContent = 'Скопировано!';
                    btn.classList.add('copied');
                    setTimeout(function () {
                        btn.textContent = 'Скопировать';
                        btn.classList.remove('copied');
                    }, 2000);
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text)
                        .then(showSuccess)
                        .catch(function() {
                            // Если API недоступно, пробуем старый метод
                            textarea.select();
                            document.execCommand('copy');
                            showSuccess();
                        });
                } else {
                    // Старый метод для старых браузеров
                    textarea.select();
                    document.execCommand('copy');
                    showSuccess();
                }
            });
        })();
